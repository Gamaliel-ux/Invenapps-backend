version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: invenapps-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: invenapps
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: invenapps-backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://postgres:password123@postgres:5432/invenapps?schema=public"
      JWT_SECRET: "super_secret_jwt_key_invenapps_2026"
      PORT: 3000
    depends_on:
      - postgres

volumes:
  pgdata:
